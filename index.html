<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juego del Ahorcado - Frontend</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <!-- CSS propio -->
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-light">

<div class="container text-center mt-4">

  <h1 class="mb-2">🎯 Juego del Ahorcado</h1>
  <p class="text-muted">Temática: Programación Frontend</p>

  <!-- MODO DE JUEGO -->
  <div class="my-3">
    <label class="form-label">Modo de juego:</label>
    <select id="modo" class="form-select w-75 mx-auto">
      <option value="6">Normal (6 intentos)</option>
      <option value="4">Difícil (4 intentos)</option>
    </select>
  </div>

  <!-- ESTADO VISUAL -->
  <div class="card mx-auto my-3 estado-card">
    <div class="card-body">
      <h6 class="card-title">Estado del juego</h6>

      <div id="estadoVisual" class="display-4 text-danger">
        <i class="bi bi-square"></i>
      </div>

      <div class="progress mt-3">
        <div id="barraIntentos" class="progress-bar bg-danger" style="width:100%">
          6 intentos
        </div>
      </div>
    </div>
  </div>

  <!-- PISTA -->
  <div class="alert alert-info">
    <strong>Pista:</strong> <span id="pista"></span>
  </div>

  <!-- PALABRA -->
  <div id="palabra" class="my-4"></div>

  <p><strong>Intentos restantes:</strong> <span id="intentos">6</span></p>

  <!-- LETRAS -->
  <div id="letras" class="d-flex flex-wrap justify-content-center my-3"></div>

  <!-- BOTÓN -->
  <button class="btn btn-danger mt-3" onclick="reiniciarJuego()">
    Reiniciar juego
  </button>

</div>

<script src="assets/js/script.js"></script>
</body>
</html>
